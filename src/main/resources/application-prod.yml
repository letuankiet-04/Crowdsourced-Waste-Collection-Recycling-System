spring:
  jackson:
    time-zone: Asia/Ho_Chi_Minh
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

# Production: nên set qua env (Render: JWT_SIGNER_KEY, APP_CORS_ALLOWED_ORIGINS).
# Nếu JWT_SIGNER_KEY khác với lúc phát hành token → decode fail → 401 Unauthenticated.
jwt:
  signerKey: ${JWT_SIGNER_KEY:72d6236b1a543277ad6973b2693a14ab13c437f8749b185a301f5034bbe3de36}
  valid-duration: ${JWT_VALID_DURATION:3600}

app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}
    modular: true
  cors:
    # Danh sách origin frontend, cách nhau bởi dấu phẩy. Ví dụ: https://your-app.vercel.app, http://localhost:5173
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://crowdsourced-waste-collection-recyc-khaki.vercel.app, https://*.vercel.app, http://localhost:5173}

spring:
  application:
    name: Crowdsourced-Waste-Collection-Recycling-System

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=HSF302;encrypt=true;trustServerCertificate=true
    username: sa
    password: 12345
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

open:
  api:
    title: Crowdsourced Waste Collection Recycling System API
    version: v1
    description: API documentation for Crowdsourced Waste Collection Recycling System

spring:
  application:
    name: Crowdsourced-Waste-Collection-Recycling-System

  datasource:
    url: jdbc:mysql://${{MYSQLUSER}}:${{MYSQL_ROOT_PASSWORD}}@${{RAILWAY_PRIVATE_DOMAIN}}:3306/${{MYSQL_DATABASE}}
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:gumGGQneXVhliEFceJppmKlqBthbzQQC}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: ${PORT:8080}

workrule:
  accept-timeout-hours: 4
  sla-hours: 72
  suspend-threshold: 3
  working-start-hour: 7
  working-end-hour: 17
  reassign-radius-km: 10.0

jwt:
  signerKey: 72d6236b1a543277ad6973b2693a14ab13c437f8749b185a301f5034bbe3de36
  valid-duration: 3600

open:
  api:
    title: Crowdsourced Waste Collection & Recycling System API
    version: 1.0.0
    description: Tài liệu API cho hệ thống thu gom và tái chế rác thải dựa trên cộng đồng.

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  show-actuator: true
  default-produces-media-type: application/json
  writer-with-default-pretty-printer: true

app:
  seed:
    enabled: false
    modular: true
  cors:
    allowed-origins: "*"

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dawzawtbz}
  api-key: ${CLOUDINARY_API_KEY:647161479214626}
  api-secret: ${CLOUDINARY_API_SECRET:vFNgCCXljSShEbrbn7EAls1Lfh0}
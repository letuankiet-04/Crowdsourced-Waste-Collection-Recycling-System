spring:
  application:
    name: Crowdsourced-Waste-Collection-Recycling-System
  jackson:
    time-zone: UTC
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:${MYSQL_HOST:mainline.proxy.rlwy.net}}:${MYSQLPORT:${MYSQL_PORT:37671}}/${MYSQLDATABASE:${MYSQL_DATABASE:railway}}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=10000&socketTimeout=60000}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:${MYSQL_USER:root}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:${MYSQL_PASSWORD:ndTodFpZUCKFpVehhxHCLbcZXMRHhMYv}}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

server:
  port: ${PORT:8080}

workrule:
  accept-timeout-hours: 24
  sla-hours: 72
  suspend-threshold: 3
  working-start-hour: 0
  working-end-hour: 23
  reassign-radius-km: 10.0

jwt:
  signerKey: ${JWT_SIGNER_KEY:72d6236b1a543277ad6973b2693a14ab13c437f8749b185a301f5034bbe3de36}
  valid-duration: ${JWT_VALID_DURATION:3600}

open:
  api:
    title: Crowdsourced Waste Collection & Recycling System API
    version: 1.0.0
    description: Tài liệu API cho hệ thống thu gom và tái chế rác thải dựa trên cộng đồng.

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  show-actuator: true
  default-produces-media-type: application/json
  writer-with-default-pretty-printer: true

app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}
    modular: true
  cors:
    allowed-origins: "${APP_CORS_ALLOWED_ORIGINS:https://crowdsourced-waste-collection-recyc-khaki.vercel.app, https://*.vercel.app, http://localhost:5173}"

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dawzawtbz}
  api-key: ${CLOUDINARY_API_KEY:647161479214626}
  api-secret: ${CLOUDINARY_API_SECRET:vFNgCCXljSShEbrbn7EAls1Lfh0}

---

spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---

spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
